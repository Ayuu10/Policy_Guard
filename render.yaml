services:
  # 1. FastAPI Backend Web Service
  - type: web
    name: policyguard-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: policyguard-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false # Render prompts the user for this key on deployment
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: "10"


  # 2. React Nginx Frontend Web Service
  - type: web
    name: policyguard-frontend
    env: docker
    dockerContext: frontend
    dockerfilePath: frontend/Dockerfile
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://policyguard-backend.onrender.com

databases:
  # 3. PostgreSQL Database Instance
  - name: policyguard-db
    plan: free
